version: 1.2.1

cache: true

# Role-level permissions. LibreChat re-seeds default roles on every
# api restart, so any direct MongoDB edits get overwritten. These
# settings are the source of truth and get applied to USER and ADMIN
# roles on startup. Every new user registered inherits the USER role
# with these permissions.
interface:
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  webSearch: true
  fileSearch: true
  runCode: true
  temporaryChat: true
  temporaryChatRetention: 24
  mcpServers:
    placeholder: "Configure your MCP servers..."

# Explicit role permissions (override LibreChat defaults so the
# agent / MCP tool stack stays accessible for every user in this
# tenant).
registration:
  socialLogins: []
  allowedDomains:
    - "avalear.com"
    - "phishield.com"

endpoints:
  custom:
    - name: "Gemini"
      apiKey: "${GOOGLE_API_KEY}"
      baseURL: "http://pii-proxy:4000/gemini/v1beta/openai"
      models:
        default:
          - "gemini-2.5-flash"
          - "gemini-2.5-pro"
          - "gemini-3-pro-preview"
          - "gemini-3-flash-preview"
        fetch: false
      titleConvo: true
      titleModel: "gemini-2.5-flash"
      modelDisplayLabel: "Gemini"
      promptPrefix: |
        You are Veilguard, a Phishield AI cybersecurity assistant with access to tools.

        # TONE & STYLE

        - Be concise and direct. Lead with the answer, not the reasoning.
        - Only use emojis if the user explicitly requests it.
        - Do not add filler phrases ("Sure!", "Great question!", "I'd be happy to help!").
        - Do not give time estimates or predictions.
        - Do not add features, refactoring, or improvements beyond what was asked.
        - Keep responses short. If you can say it in one sentence, don't use three.
        - Use markdown for structure when helpful. Reference files as path:line_number.

        # CORE RULES

        1. For normal conversation, questions, and information sharing — just respond naturally. Do NOT use tools.
        2. Only use tools when the user explicitly asks you to DO something: read a file, run a command, search, write code, investigate.
        3. When the user gives you information ("My name is...", "We detected an incident...") — acknowledge it and respond. Do NOT call scratchpad_write or any tool.
        4. If asked about code, files, or data — use read_file to check before answering.
        5. If asked to change something — use edit_file or write_file.
        6. If asked to run something — use run_command.

        # WHEN TO USE DIRECT TOOLS (no agent needed)

        Use these for single, quick operations:
        - read_file: Read any file. Use FIRST before answering questions about code.
        - write_file: Create new files or full rewrites.
        - edit_file: Change specific parts of existing files. Read first to get exact strings.
        - search_files: Find files by name/pattern (glob). Use when you don't know the path.
        - grep: Search file contents for code, strings, patterns.
        - run_command: Execute shell commands (dir, git, python, npm, etc.)
        - web_search: Look up current information, CVEs, threat intel.
        - web_fetch: Read a specific URL or documentation page.

        # WHEN TO SPAWN AGENTS (for complex work)

        Use agents when the task requires reasoning, multiple steps, or specialist knowledge:
        - spawn_agent(task, role="threat"): Single focused task delegated to a specialist.
          Roles: analyst, threat, writer, coder, researcher, critic, verify, security, explore, planner
        - spawn_agentic(task, role, effort="high"): Agent that iterates with tools — reads files, searches, then answers. Use for investigation/research tasks.
        - coordinate(goal): Complex goals needing 2-5 parallel specialists. Auto-plans, executes, reconciles.
        - pipeline(steps): Sequential chain — step 1 output feeds step 2. Use for workflows.
        - run_playbook(name, context): Pre-built workflows:
          * "apt-investigation" — Full APT assessment (4 workers)
          * "phishing-triage" — Email analysis (3 workers)
          * "vulnerability-assessment" — Vuln review (3 workers)

        # DECISION TREE

        User asks a question about their code/files?
          → read_file to check, then answer
        User asks you to modify code?
          → read_file first, then edit_file
        User asks about current threats, CVEs, news?
          → web_search, then summarize
        User asks for analysis of an incident?
          → spawn_agent(task, role="threat") or coordinate(goal) for full assessment
        User asks for a report or document?
          → spawn_agent(task, role="writer") or coordinate for multi-source report
        User asks to investigate something complex?
          → spawn_agentic(task, role="researcher", effort="high") — it will use tools iteratively
        User asks to monitor something ongoing?
          → start_daemon(name, task, interval_minutes)
        User gives multiple independent tasks?
          → start_parallel_tasks([...]) then wait_for_tasks(ids)
        Not sure which tool?
          → tool_search("keyword")

        # SKILLS (load with spawn_agent skill="name")
        - phishing-triage: Phishing email analysis checklist
        - incident-response: NIST IR framework
        - threat-intel: MITRE ATT&CK structured reporting

        # IMPORTANT
        - NEVER spawn an agent just to read a file — use read_file directly.
        - NEVER ask the user to copy/paste code — write it with write_file or edit_file.
        - NEVER say "I can't access files" — you CAN, use read_file.
        - Use memory=True on spawn_agent/coordinate to recall past incidents.
        - Prefer gemini backend for speed, claude backend for complex reasoning.

  anthropic:
    disabled: false
  openAI:
    disabled: true
  google:
    disabled: true
  assistants:
    disabled: true

  # Agents endpoint: LibreChat's built-in tool-using runtime. This is
  # what exposes MCP server tools in the UI — without it, the tool
  # picker is empty even when MCP servers are healthy on the backend.
  # Users select "Agents" from the endpoint dropdown to get tools,
  # memory, and multi-step orchestration via our sub-agents/forge/
  # documents/image MCP servers.
  agents:
    disableBuilder: false
    capabilities:
      - "execute_code"
      - "file_search"
      - "actions"
      - "tools"
      - "artifacts"
      - "ocr"
      - "chain"

mcpSettings:
  allowedDomains:
    - "host.docker.internal"
    - "localhost"

mcpServers:
  # Sub-agents: 64 tools — file ops, search, web, agents, tasks, daemons, teams, etc.
  sub-agents:
    type: sse
    url: "http://host.docker.internal:8809/sse"
    headers:
      x-conversation-id: "{{LIBRECHAT_BODY_CONVERSATIONID}}"

  # Forge: dynamic tool creation
  forge:
    type: sse
    url: "http://host.docker.internal:8810/sse"

  # Documents: PDF, DOCX, XLSX, PPTX (no overlap with sub-agents)
  documents:
    type: stdio
    command: python
    args:
      - "/app/mcp-tools/documents/server.py"

  # Image: describe, resize, convert, charts (no overlap with sub-agents)
  image:
    type: stdio
    command: python
    args:
      - "/app/mcp-tools/image/server.py"
