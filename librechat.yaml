version: 1.2.1

cache: true

# Role-level permissions. LibreChat re-seeds default roles on every
# api restart, so any direct MongoDB edits get overwritten. These
# settings are the source of truth and get applied to USER and ADMIN
# roles on startup. Every new user registered inherits the USER role
# with these permissions.
interface:
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  # Agents and MCP server permissions are authored here because LibreChat
  # reads interface.{agents,mcpServers} at api boot and seeds the USER +
  # ADMIN role-permission documents from them (mapping in
  # librechat-data-provider/permissions.ts:PERMISSION_TYPE_INTERFACE_FIELDS).
  # Anything we set here survives container restarts; direct MongoDB
  # edits on role docs get overwritten every boot.
  agents:
    use: true
    create: true
    share: true
    public: true
  mcpServers:
    placeholder: "Configure your MCP servers..."
    use: true
    create: true
    share: true
    public: true
  webSearch: true
  fileSearch: true
  runCode: true
  temporaryChat: true
  temporaryChatRetention: 24

# Registration is restricted to Avalear + Phishield employees.  Role
# permissions are authored under `interface` above — LibreChat's schema
# doesn't accept a top-level rolePermissions block (that was a LibreChat
# 0.8.x ZodError — "Unrecognized key(s) in object").
registration:
  socialLogins: []
  allowedDomains:
    - "avalear.com"
    - "phishield.com"

endpoints:
  # Claude-only tenant.  Gemini + OpenAI + Google built-ins disabled.
  # All traffic routes through pii-proxy which strips PII before
  # forwarding to api.anthropic.com (baseURL below) — same pattern the
  # previous Gemini custom endpoint used.
  # LibreChat's anthropic-endpoint schema is narrow: only
  # streamRate/baseURL/title*/maxToolResultChars from baseEndpointSchema
  # plus ``vertex`` and ``models: array<string>``.  Fields like
  # ``disabled``, ``apiKey``, ``modelDisplayLabel``, ``promptPrefix``,
  # or the ``{default, fetch}`` custom-endpoint shape raise Zod errors
  # on boot and crash the container.  API key comes from
  # ANTHROPIC_API_KEY in .env; Veilguard system prompt lives on the
  # Agents endpoint / per-Agent presets in the UI.
  anthropic:
    baseURL: "http://pii-proxy:4000/anthropic"
    # Order here drives the dropdown order in LibreChat.
    # "claude-opus-4-7-1m" is a synthetic ID the pii-proxy rewrites to
    # "claude-opus-4-7" + ``context-1m-2025-08-07`` beta header —
    # same weights, 1M-token context window.
    models:
      - "claude-opus-4-7"
      - "claude-opus-4-7-1m"
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5"
    titleConvo: true
    titleModel: "claude-haiku-4-5"

  # OpenAI / Google / Assistants not declared → LibreChat won't render
  # them.  (The previous ``disabled: true`` pattern was accepted by
  # older schemas but is no-op on anthropicEndpointSchema and adds
  # noise on the other built-ins.  Leaving a key off is the supported
  # way to hide it.)

  # Agents endpoint: LibreChat's built-in tool-using runtime. This is
  # what exposes MCP server tools in the UI — without it, the tool
  # picker is empty even when MCP servers are healthy on the backend.
  # Users select "Agents" from the endpoint dropdown to get tools,
  # memory, and multi-step orchestration via our sub-agents/forge/
  # documents/image MCP servers.
  agents:
    disableBuilder: false
    # LangGraph recursion cap — each node transition (LLM call OR tool
    # invocation) counts as 1 step, so 1 tool-use round-trip = ~2 steps.
    # Default 50 = ~25 tool iterations; observed 23 Apr 2026 hitting
    # GRAPH_RECURSION_LIMIT on a normal dev run that chained grep +
    # run_command + edit across multiple files. Bump to 150 (~75
    # iterations) for headroom on agentic research flows. Keep
    # maxRecursionLimit as a hard safety cap so a buggy agent can't
    # infinite-loop and melt the bill.
    recursionLimit: 150
    maxRecursionLimit: 250
    capabilities:
      - "execute_code"
      - "file_search"
      - "actions"
      - "tools"
      - "artifacts"
      - "ocr"
      - "chain"

mcpSettings:
  allowedDomains:
    - "host.docker.internal"
    - "localhost"

mcpServers:
  # Sub-agents: 64 tools — file ops, search, web, agents, tasks, daemons, teams, etc.
  sub-agents:
    type: sse
    url: "http://host.docker.internal:8809/sse"
    headers:
      x-conversation-id: "{{LIBRECHAT_BODY_CONVERSATIONID}}"
      x-user-id: "{{LIBRECHAT_USER_ID}}"

  # Forge: dynamic tool creation
  forge:
    type: sse
    url: "http://host.docker.internal:8810/sse"
    headers:
      x-conversation-id: "{{LIBRECHAT_BODY_CONVERSATIONID}}"
      x-user-id: "{{LIBRECHAT_USER_ID}}"

  # Documents: PDF, DOCX, XLSX, PPTX (no overlap with sub-agents)
  documents:
    type: stdio
    command: python
    args:
      - "/app/mcp-tools/documents/server.py"

  # Image: describe, resize, convert, charts (no overlap with sub-agents)
  image:
    type: stdio
    command: python
    args:
      - "/app/mcp-tools/image/server.py"

  # Web: Google Custom Search + URL fetching + HTML-to-markdown.
  # Uses GOOGLE_CSE_KEY + GOOGLE_CSE_ID from .env — both live under the
  # admin@phishield.com GCP project and Programmable Search Engine.
  # Stdio spawn (like documents/image) — lives inside the LibreChat
  # container so the Agents endpoint can dispatch google_search alongside
  # the other MCP tools.
  web:
    type: stdio
    command: python
    args:
      - "/app/mcp-tools/web/server.py"

  # ─── SharePoint connector — OAuth-aware SSE transport ────────────────
  #
  # Per-user OAuth via Microsoft Identity Platform. LibreChat runs the
  # standard /api/mcp/sharepoint/oauth/initiate flow against the
  # endpoints below, stores the resulting token via MCPTokenStorage,
  # then injects `Authorization: Bearer <token>` on every SSE request
  # to the SharePoint MCP server (running locally on port 8812).
  #
  # The SharePoint MCP server (mcp-tools/connectors/sharepoint/server.py)
  # also reads tokens via the internal credential endpoint
  # (/api/mcp/internal/oauth/token/...) for in-process recall fan-out
  # — see mcp-tools/connectors/_base/credentials.py.
  #
  # ── Operator setup (uncomment + configure to enable) ───────────────
  # 1. Register an Azure AD app at https://entra.microsoft.com:
  #      Redirect URI: <YOUR_LIBRECHAT_BASE>/api/mcp/sharepoint/oauth/callback
  #      API permissions: Sites.Read.All, Files.Read.All, offline_access
  #                       (delegated, NOT application)
  #      Grant admin consent if your tenant requires it.
  # 2. Set env vars on the LibreChat container:
  #      SHAREPOINT_CLIENT_ID, SHAREPOINT_CLIENT_SECRET,
  #      VEILGUARD_INTERNAL_SECRET (also on the SharePoint server side)
  # 3. Run the SharePoint MCP server:
  #      SHAREPOINT_TRANSPORT=sse SHAREPOINT_PORT=8812 \
  #      python mcp-tools/connectors/sharepoint/server.py
  # 4. Uncomment the block below.
  # 5. Restart LibreChat.
  #
  # sharepoint:
  #   type: sse
  #   url: "http://host.docker.internal:8812/sse"
  #   headers:
  #     x-conversation-id: "{{LIBRECHAT_BODY_CONVERSATIONID}}"
  #     x-user-id: "{{LIBRECHAT_USER_ID}}"
  #   oauth:
  #     authorization_url: "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
  #     token_url: "https://login.microsoftonline.com/common/oauth2/v2.0/token"
  #     client_id: "${SHAREPOINT_CLIENT_ID}"
  #     client_secret: "${SHAREPOINT_CLIENT_SECRET}"
  #     scope: "Sites.Read.All Files.Read.All offline_access"
