services:
  # === LibreChat (with Python for MCP tools) ===
  api:
    build:
      context: .
      dockerfile: Dockerfile.librechat
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    # Linux Docker doesn't auto-create host.docker.internal (unlike
    # Docker Desktop on Mac/Windows). LibreChat's MCP config points at
    # host.docker.internal:{8809,8810,8811} to reach sub-agents/forge/
    # TCMM which run as bare Python processes on the host. Without
    # host-gateway, MCP SSE connections fail silently and tools don't
    # show up in the UI.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_started
      meilisearch:
        condition: service_started
      pii-proxy:
        condition: service_healthy
    restart: always
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - NO_INDEX=true
      - WORKSPACE_ROOT=/workspace
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - ./mcp-tools:/app/mcp-tools
      - ./workspace:/workspace
      - librechat-images:/app/client/public/images
      - librechat-logs:/app/api/logs
      # Custom Veilguard frontend (built from librechat-src fork)
      - ./librechat-src/client/dist:/app/client/dist
      # Custom Veilguard backend routes (authenticated proxy for the
      # client-daemon install flow).  Only the specific files we added
      # or modified — mounting the whole api/ directory would shadow
      # everything in the stock image.
      - ./librechat-src/api/server/routes/veilguardClient.js:/app/api/server/routes/veilguardClient.js:ro
      - ./librechat-src/api/server/routes/index.js:/app/api/server/routes/index.js:ro
      - ./librechat-src/api/server/experimental.js:/app/api/server/experimental.js:ro
      - ./librechat-src/api/server/index.js:/app/api/server/index.js:ro

  # === MongoDB ===
  mongodb:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo-data:/data/db
    command: mongod --noauth

  # === MeiliSearch ===
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: always
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili-data:/meili_data

  # === Veilguard PII Gateway (FastAPI + Presidio) ===
  pii-proxy:
    build: ./pii-proxy
    ports:
      - "4000:4000"
    # Same reason as api: TCMM_URL points at host.docker.internal:8811
    # for the memory integration. On Linux this needs host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./pii-proxy/app:/app/app
      - ./logs:/app/logs
      # Mount the TCMM Lance directory so audit_db.py can write to the
      # pii_audit table alongside TCMM's archive/sparse/dream tables.
      # We speak raw LanceDB here — no TCMM package code ever runs in
      # this container — but we share the on-disk store so ops only
      # has to back up one directory for both services.
      - ./tcmm-data:/tcmm-data
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ANTHROPIC_API_URL=${ANTHROPIC_API_URL:-https://api.anthropic.com}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com}
      - GEMINI_API_URL=${GEMINI_API_URL:-https://generativelanguage.googleapis.com}
      - PII_PROXY_PORT=4000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MIN_SCORE=${MIN_SCORE:-0.7}
      - TCMM_ENABLED=${TCMM_ENABLED:-false}
      - TCMM_URL=${TCMM_URL:-http://host.docker.internal:8811}
      # Where audit_db.py writes the pii_audit table.  Must be the
      # same Lance directory TCMM opens on the host so rows live next
      # to archive / sparse / dream data.
      - VEILGUARD_AUDIT_DB_PATH=${VEILGUARD_AUDIT_DB_PATH:-/tcmm-data/veilguard/tcmm.db}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongo-data:
  meili-data:
  librechat-images:
  librechat-logs:
